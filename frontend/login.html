<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — InfoLoker</title>
<link rel="stylesheet" href="../styles.css">
<style>
  .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--surface); padding: 24px; }
  .auth-card { background: var(--card); border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,.1); padding: 40px; width: 100%; max-width: 420px; }
  .auth-logo { text-align: center; font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 24px; }
  .auth-card h2 { font-size: 1.25rem; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .form-group input { width: 100%; padding: 10px 14px; border: 1.5px solid #d0d5dd; border-radius: 8px; font-size: .95rem; outline: none; box-sizing: border-box; }
  .form-group input:focus { border-color: var(--primary); }
  .err { color: #c62828; font-size: .82rem; margin-top: 4px; display: none; }
  .btn-primary { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 8px; }
  .btn-primary:hover { background: var(--primary-dark); }
  .auth-footer { text-align: center; margin-top: 20px; font-size: .88rem; color: var(--muted); }
  .auth-footer a { color: var(--primary); font-weight: 600; }
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">InfoLoker</div>
    <h2>Masuk ke Akun Anda</h2>
    <form id="form-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="nama@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:8px">
        <input type="checkbox" id="remember" style="width:auto">
        <label for="remember" style="margin:0;font-weight:400">Ingat saya (7 hari)</label>
      </div>
      <p class="err" id="err-msg"></p>
      <button class="btn-primary" type="submit">Masuk</button>
    </form>
    <div class="auth-footer">
      Belum punya akun? <a href="register.html">Daftar sekarang</a>
    </div>
  </div>
</div>
<script src="../shared.js"></script>
<script src="api.js"></script>
<script src="auth.js"></script>
<script>
if (authUtils.isLoggedIn()) window.location.href = '../index.html';

document.getElementById('form-login').addEventListener('submit', async e => {
  e.preventDefault();
  const errEl = document.getElementById('err-msg');
  errEl.style.display = 'none';
  try {
    const data = await api.post('/auth/login', {
      email:    document.getElementById('email').value,
      password: document.getElementById('password').value,
      remember: document.getElementById('remember').checked,
    });
    authUtils.saveAuth(data.data.token, data.data.user);
    const role = data.data.user.role;
    if (role === 'admin')       window.location.href = 'dashboard-admin.html';
    else if (role === 'perusahaan') window.location.href = 'dashboard-perusahaan.html';
    else                        window.location.href = 'dashboard-pelamar.html';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
  }
});
</script>
</body>
</html>
