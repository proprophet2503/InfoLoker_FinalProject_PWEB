<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar — InfoLoker</title>
<link rel="stylesheet" href="../styles.css">
<style>
  .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--surface); padding: 24px; }
  .auth-card { background: var(--card); border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,.1); padding: 40px; width: 100%; max-width: 480px; }
  .auth-logo { text-align: center; font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 24px; }
  .auth-card h2 { font-size: 1.25rem; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: 6px; }
  .form-group input, .form-group select { width: 100%; padding: 10px 14px; border: 1.5px solid #d0d5dd; border-radius: 8px; font-size: .95rem; outline: none; box-sizing: border-box; }
  .form-group input:focus, .form-group select:focus { border-color: var(--primary); }
  .err { color: #c62828; font-size: .82rem; margin-top: 4px; display: none; }
  .btn-primary { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 8px; }
  .btn-primary:hover { background: var(--primary-dark); }
  .auth-footer { text-align: center; margin-top: 20px; font-size: .88rem; color: var(--muted); }
  .auth-footer a { color: var(--primary); font-weight: 600; }
  #field-perusahaan { display: none; }
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">InfoLoker</div>
    <h2>Buat Akun Baru</h2>
    <form id="form-register">
      <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" id="nama" placeholder="Nama lengkap Anda" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="nama@email.com" required>
      </div>
      <div class="form-group">
        <label>Nomor HP</label>
        <input type="tel" id="no_hp" placeholder="08xxxxxxxxxx">
      </div>
      <div class="form-group">
        <label>Daftar sebagai</label>
        <select id="role" required>
          <option value="pelamar">Pencari Kerja (Pelamar)</option>
          <option value="perusahaan">Perusahaan / Employer</option>
        </select>
      </div>
      <div class="form-group" id="field-perusahaan">
        <label>Nama Perusahaan</label>
        <input type="text" id="nama_perusahaan" placeholder="PT. Nama Perusahaan">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min. 8 karakter + angka" required>
      </div>
      <div class="form-group">
        <label>Konfirmasi Password</label>
        <input type="password" id="confirm_password" placeholder="Ulangi password" required>
      </div>
      <p class="err" id="err-msg"></p>
      <button class="btn-primary" type="submit">Daftar Sekarang</button>
    </form>
    <div class="auth-footer">Sudah punya akun? <a href="login.html">Masuk</a></div>
  </div>
</div>
<script src="../shared.js"></script>
<script src="api.js"></script>
<script src="auth.js"></script>
<script>
if (authUtils.isLoggedIn()) window.location.href = '../index.html';

document.getElementById('role').addEventListener('change', e => {
  document.getElementById('field-perusahaan').style.display = e.target.value === 'perusahaan' ? '' : 'none';
});

document.getElementById('form-register').addEventListener('submit', async e => {
  e.preventDefault();
  const errEl = document.getElementById('err-msg');
  errEl.style.display = 'none';

  const pwd = document.getElementById('password').value;
  const cpwd = document.getElementById('confirm_password').value;
  if (pwd !== cpwd) { errEl.textContent = 'Password tidak cocok'; errEl.style.display = 'block'; return; }

  const role = document.getElementById('role').value;
  const body = {
    nama: document.getElementById('nama').value,
    email: document.getElementById('email').value,
    password: pwd,
    role,
    no_hp: document.getElementById('no_hp').value || undefined,
  };
  if (role === 'perusahaan') body.nama_perusahaan = document.getElementById('nama_perusahaan').value;

  try {
    await api.post('/auth/register', body);
    window.location.href = 'login.html?registered=1';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
  }
});
</script>
</body>
</html>
