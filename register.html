<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar — InfoLoker</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--surface,#f3f4f6); padding: 24px; }
  .auth-card { background: #fff; border-radius: 14px; box-shadow: 0 8px 30px rgba(0,0,0,.1); padding: 40px; width: 100%; max-width: 480px; }
  .auth-logo { text-align: center; font-size: 1.5rem; font-weight: 800; color: var(--primary,#2563eb); margin-bottom: 6px; }
  .auth-card h2 { font-size: 1.2rem; margin-bottom: 20px; text-align:center; color:#111827 }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: 6px; color:#374151 }
  .form-group input, .form-group select { width: 100%; padding: 11px 14px; border: 1.5px solid #d0d5dd; border-radius: 8px; font-size: .95rem; outline: none; box-sizing: border-box; }
  .form-group input:focus, .form-group select:focus { border-color: var(--primary,#2563eb); }
  .err { color: #c62828; font-size: .85rem; margin: 8px 0; display: none; }
  .btn-primary { width: 100%; padding: 12px; background: var(--primary,#2563eb); color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 4px; }
  .btn-primary:disabled { opacity:.6; cursor:not-allowed }
  .auth-footer { text-align: center; margin-top: 20px; font-size: .88rem; color:#6b7280 }
  .auth-footer a { color: var(--primary,#2563eb); font-weight: 600; text-decoration:none }
  #field-perusahaan { display: none; }
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">InfoLoker</div>
    <h2>Buat Akun Baru</h2>
    <form id="form-register">
      <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" id="nama" placeholder="Nama lengkap Anda" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="nama@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Nomor HP</label>
        <input type="tel" id="no_hp" placeholder="08xxxxxxxxxx">
      </div>
      <div class="form-group">
        <label>Daftar sebagai</label>
        <select id="role" required>
          <option value="pelamar">Pencari Kerja (Pelamar)</option>
          <option value="perusahaan">Perusahaan / Employer</option>
        </select>
      </div>
      <div class="form-group" id="field-perusahaan">
        <label>Nama Perusahaan</label>
        <input type="text" id="nama_perusahaan" placeholder="PT. Nama Perusahaan">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min. 8 karakter + angka" required autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Konfirmasi Password</label>
        <input type="password" id="confirm_password" placeholder="Ulangi password" required autocomplete="new-password">
      </div>
      <p class="err" id="err-msg"></p>
      <button class="btn-primary" type="submit" id="submit-btn">Daftar Sekarang</button>
    </form>
    <div class="auth-footer">Sudah punya akun? <a href="login.html">Masuk</a></div>
  </div>
</div>
<script src="./api.js"></script>
<script src="./auth.js"></script>
<script>
authUtils.ready.then(user => { if (user) window.location.href = 'index.html'; });

document.getElementById('role').addEventListener('change', e => {
  document.getElementById('field-perusahaan').style.display =
    e.target.value === 'perusahaan' ? 'block' : 'none';
});

document.getElementById('form-register').addEventListener('submit', async e => {
  e.preventDefault();
  const errEl = document.getElementById('err-msg');
  const btn = document.getElementById('submit-btn');
  errEl.style.display = 'none';

  const pwd  = document.getElementById('password').value;
  const cpwd = document.getElementById('confirm_password').value;
  if (pwd !== cpwd) { errEl.textContent = 'Password tidak cocok.'; errEl.style.display = 'block'; return; }

  const role = document.getElementById('role').value;
  const body = {
    nama: document.getElementById('nama').value,
    email: document.getElementById('email').value,
    password: pwd,
    role,
    no_hp: document.getElementById('no_hp').value || undefined,
  };
  if (role === 'perusahaan') body.nama_perusahaan = document.getElementById('nama_perusahaan').value;

  btn.disabled = true; btn.textContent = 'Memproses...';
  try {
    await api.post('/auth/register.php', body);
    window.location.href = 'login.html?registered=1';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Daftar Sekarang';
  }
});
</script>
</body>
</html>
